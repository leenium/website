<section class="surface">
  <div class="section-heading">
    <h2>Current release</h2>
    <p>Download the ISO and verify checksum plus signature before flashing to USB.</p>
  </div>

  <div class="split">
    <article class="surface" style="background:rgba(255,255,255,0.02);">
      <h3>Artifacts</h3>
      <div class="hero-actions">
        <a class="button primary" href="http://cdn.leenium.org/leenium.iso" target="_blank" rel="noopener noreferrer">Download ISO</a>
        <a class="button secondary" href="http://cdn.leenium.org/leenium.iso.sha256sum" target="_blank" rel="noopener noreferrer">SHA256 file</a>
        <a class="button secondary" href="http://cdn.leenium.org/leenium.iso.sig" target="_blank" rel="noopener noreferrer">Signature file</a>
      </div>
    </article>

    <article class="surface" style="background:rgba(255,255,255,0.02);">
      <h3>Verify locally</h3>
      <pre><code>sha256sum -c leenium.iso.sha256sum
gpg --verify leenium.iso.sig leenium.iso</code></pre>
    </article>
  </div>
</section>
